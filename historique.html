<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPCE - Relevé d'opérations</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
 <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA-qA72xvozFbPNv0kKMcdHb4AlGZM5FpthN8nGrERlEplcDXF-8sAzJM&s=10

" />
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col md:flex-row relative overflow-x-hidden">

  <!-- Bouton Burger (Mobile) -->
  <div class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center space-x-2">
      <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm"><i class="fa-solid fa-feather-pointed"></i></div>
      <span class="tracking-tight text-slate-900 font-bold">BPCE</span>
    </div>
    <button onclick="toggleMenu()" aria-expanded="false" aria-controls="sidebar-menu" class="w-10 h-10 flex items-center justify-center text-slate-700 text-xl focus:outline-none">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <!-- Overlay -->
  <div id="sidebar-overlay" onclick="toggleMenu()" 
       class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-45 md:hidden transition-opacity duration-300 opacity-0">
  </div>

  <!-- Slide Menu -->
  <aside id="sidebar-menu" aria-hidden="true"
         class="fixed inset-y-0 left-0 w-72 md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col justify-between z-50 md:z-auto md:static transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:h-screen md:sticky md:top-0">
    <div>
      <div class="flex items-center justify-between md:justify-start space-x-2 text-blue-600 font-bold text-2xl mb-8">
        <div class="flex items-center space-x-2">
          <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white text-lg"><i class="fa-solid fa-feather-pointed"></i></div>
          <img src="https://www.iobeya.com/wp-content/uploads/2022/07/bpce-logo.png" alt="GTCO Logo" class="h-7">
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-slate-400 hover:text-slate-600">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      <nav class="space-y-1">
        <a href="dashboard.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition"><i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard</span></a>
        <a href="virement.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition"><i class="fa-solid fa-paper-plane w-5"></i><span>Faire un virement</span></a>
        <a href="ajouter-beneficiaire.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition"><i class="fa-solid fa-user-plus w-5"></i><span>Bénéficiaires</span></a>
        <a href="historique.html" class="flex items-center space-x-3 bg-blue-50 text-blue-600 p-3 rounded-xl font-medium transition"><i class="fa-solid fa-clock-rotate-left w-5"></i><span>Historique</span></a>
        <a href="mes-cartes.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition"><i class="fa-solid fa-credit-card w-5"></i><span>Mes cartes</span></a>
        <a href="rib.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition"><i class="fa-solid fa-building-columns w-5"></i><span>Mon RIB</span></a>
        <a href="profil.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition"><i class="fa-solid fa-circle-user w-5"></i><span>Mon Profil</span></a>
      </nav>
    </div>
    <div class="mt-8 pt-4 border-t border-slate-100">
      <button onclick="logout()" class="w-full flex items-center space-x-3 text-red-500 hover:bg-red-50 p-3 rounded-xl transition font-medium text-left"><i class="fa-solid fa-arrow-right-from-bracket w-5"></i><span>Déconnexion</span></button>
    </div>
  </aside>

  <!-- Contenu -->
  <main class="flex-1 p-4 md:p-8 max-w-4xl mx-auto w-full space-y-6">
    <header class="flex justify-between items-center">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Historique des opérations</h1>
        <p class="text-slate-500 text-sm mt-0.5">Consultez l'ensemble de vos écritures bancaires passées et récentes.</p>
      </div>
      <button onclick="window.print()" class="bg-white border border-slate-200 text-slate-700 font-medium px-4 py-2 rounded-xl text-sm hover:bg-slate-50 transition"><i class="fa-solid fa-print mr-2"></i>Imprimer</button>
    </header>

    <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-xs">
      <div id="full-history-container" class="divide-y divide-slate-100">
        <div class="py-8 text-center text-slate-400">Chargement...</div>
      </div>
    </div>
  </main>

  <script>
    // --- Fonction Slide Menu ---
    function toggleMenu() {
      const sidebar = document.getElementById('sidebar-menu');
      const overlay = document.getElementById('sidebar-overlay');
      const burger = document.querySelector('[aria-expanded]');
      const isClosed = sidebar.classList.contains('-translate-x-full');
      
      if (isClosed) {
        sidebar.classList.remove('-translate-x-full');
        sidebar.setAttribute('aria-hidden', 'false');
        burger.setAttribute('aria-expanded', 'true');
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.replace('opacity-0', 'opacity-100'), 10);
      } else {
        sidebar.classList.add('-translate-x-full');
        sidebar.setAttribute('aria-hidden', 'true');
        burger.setAttribute('aria-expanded', 'false');
        overlay.classList.replace('opacity-100', 'opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    // --- Firebase ---
    const firebaseConfig = { apiKey: "AIzaSyAYBpV95meCzCoLZWGBhbflqLFiqR0mToc", authDomain: "lastone-2ef2f.firebaseapp.com", projectId: "lastone-2ef2f", storageBucket: "lastone-2ef2f.firebasestorage.app", messagingSenderId: "983919060318", appId: "1:983919060318:web:2708d4b4a0ca3e2d7d5bcf" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentUserId = localStorage.getItem('currentUserId');
    if (!currentUserId) window.location.href = "index.html";

    db.collection("users").doc(currentUserId).onSnapshot((doc) => {
      if (doc.exists) {
        const history = doc.data().history || [];
        const container = document.getElementById('full-history-container');
        
        // Filtrer pour retirer l'opération de création / ouverture de compte
        const filteredHistory = history.filter(op => {
          const label = op.label.toLowerCase();
          return !label.includes("ouverture") && !label.includes("initial");
        });
        
        if (filteredHistory.length === 0) {
          container.innerHTML = `<div class="py-8 text-center text-slate-400 text-sm">Aucune opération sur ce compte.</div>`;
          return;
        }

        container.innerHTML = "";
        filteredHistory.forEach((op) => {
          const isNegative = op.amount < 0;
          // Modification ici : passage en EUR (€)
          const formattedAmount = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(op.amount);
          const opDate = new Date(op.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute:'2-digit' });

          const div = document.createElement('div');
          div.className = "flex items-center justify-between py-4";
          div.innerHTML = `
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 ${isNegative ? 'bg-rose-50 text-rose-600':'bg-emerald-50 text-emerald-600'} rounded-xl flex items-center justify-center"><i class="fa-solid ${isNegative ? 'fa-arrow-up-long':'fa-arrow-down-long'}"></i></div>
              <div>
                <p class="text-sm font-semibold text-slate-800">${op.label}</p>
                <p class="text-xs text-slate-400 font-medium">${op.type} • ${opDate}</p>
              </div>
            </div>
            <p class="text-sm font-bold ${isNegative ? 'text-slate-800' : 'text-emerald-600'}">${isNegative ? '' : '+'}${formattedAmount}</p>
          `;
          container.appendChild(div);
        });
      }
    });
    function logout() { localStorage.removeItem('currentUserId'); window.location.href = "index.html"; }
  </script>
</body>
</html>
