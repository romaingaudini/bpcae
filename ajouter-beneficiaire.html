<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPCE - Ajouter un Bénéficiaire</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA-qA72xvozFbPNv0kKMcdHb4AlGZM5FpthN8nGrERlEplcDXF-8sAzJM&s=10

" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col md:flex-row relative overflow-x-hidden">

  <!-- Bouton Burger (Mobile) -->
  <div class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center space-x-2">
      <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm"><i class="fa-solid fa-feather-pointed"></i></div>
      <span class="tracking-tight text-slate-900 font-bold">BPCE</span>
    </div>
    <button onclick="toggleMenu()" aria-expanded="false" aria-controls="sidebar-menu" class="w-10 h-10 flex items-center justify-center text-slate-700 text-xl focus:outline-none">
      <i class="fa-solid fa-bars" id="burger-icon"></i>
    </button>
  </div>

  <!-- Overlay -->
  <div id="sidebar-overlay" onclick="toggleMenu()" 
       class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-45 md:hidden transition-opacity duration-300 opacity-0">
  </div>

  <!-- Slide Menu -->
  <aside id="sidebar-menu" aria-hidden="true"
         class="fixed inset-y-0 left-0 w-72 md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col justify-between z-50 md:z-auto md:static transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out md:h-screen md:sticky md:top-0">
    <div>
      <div class="flex items-center justify-between md:justify-start space-x-2 text-blue-600 font-bold text-2xl mb-8">
        <div class="flex items-center space-x-2">
          <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white text-lg"><i class="fa-solid fa-feather-pointed"></i></div>
          <img src="https://www.iobeya.com/wp-content/uploads/2022/07/bpce-logo.png" alt="GTCO Logo" class="h-7">
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-slate-400 hover:text-slate-600">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      
      <nav class="space-y-1">
        <a href="dashboard.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-chart-pie w-5"></i><span>Dashboard</span>
        </a>
        <a href="virement.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-paper-plane w-5"></i><span>Faire un virement</span>
        </a>
        <a href="ajouter-beneficiaire.html" class="flex items-center space-x-3 bg-blue-50 text-blue-600 p-3 rounded-xl font-medium transition">
          <i class="fa-solid fa-user-plus w-5"></i><span>Bénéficiaires</span>
        </a>
        <a href="historique.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-clock-rotate-left w-5"></i><span>Historique</span>
        </a>
        <a href="mes-cartes.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-credit-card w-5"></i><span>Mes cartes</span>
        </a>
        <a href="rib.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-building-columns w-5"></i><span>Mon RIB</span>
        </a>
        <a href="profil.html" class="flex items-center space-x-3 text-slate-600 hover:bg-slate-50 p-3 rounded-xl transition">
          <i class="fa-solid fa-circle-user w-5"></i><span>Mon Profil</span>
        </a>
      </nav>
    </div>

    <div class="mt-8 pt-4 border-t border-slate-100">
      <button onclick="logout()" class="w-full flex items-center space-x-3 text-red-500 hover:bg-red-50 p-3 rounded-xl transition font-medium text-left">
        <i class="fa-solid fa-arrow-right-from-bracket w-5"></i><span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Contenu Principal -->
  <main class="flex-1 p-4 md:p-8 max-w-4xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-1 space-y-4">
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Mes Bénéficiaires</h1>
      <p class="text-slate-500 text-sm">Ajoutez de nouveaux comptes externes pour pouvoir programmer des virements.</p>
      
      <form onsubmit="addBeneficiary(event)" class="bg-white border border-slate-200 rounded-2xl p-5 space-y-4 shadow-xs mt-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Nom du titulaire</label>
          <input type="text" id="b-name" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm" placeholder="Ex: Jean Dupont">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">IBAN</label>
          <input type="text" id="b-iban" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 font-mono text-sm uppercase" placeholder="FR76...">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl transition text-sm">Ajouter au carnet</button>
      </form>
    </div>

    <!-- Liste des bénéficiaires -->
    <div class="lg:col-span-2">
      <div class="bg-white border border-slate-200 rounded-3xl p-5 shadow-xs">
        <h3 class="font-bold text-slate-900 text-lg mb-4">Carnet enregistré</h3>
        <div id="beneficiaries-list" class="divide-y divide-slate-100">
          <div class="py-4 text-center text-slate-400 text-sm">Aucun bénéficiaire enregistré.</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- Fonction Slide Menu ---
    function toggleMenu() {
      const sidebar = document.getElementById('sidebar-menu');
      const overlay = document.getElementById('sidebar-overlay');
      const burger = document.querySelector('[aria-expanded]');

      const isClosed = sidebar.classList.contains('-translate-x-full');
      
      if (isClosed) {
        sidebar.classList.remove('-translate-x-full');
        sidebar.setAttribute('aria-hidden', 'false');
        burger.setAttribute('aria-expanded', 'true');
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.replace('opacity-0', 'opacity-100'), 10);
      } else {
        sidebar.classList.add('-translate-x-full');
        sidebar.setAttribute('aria-hidden', 'true');
        burger.setAttribute('aria-expanded', 'false');
        overlay.classList.replace('opacity-100', 'opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }

    }

    // --- Configuration Firebase ---
    const firebaseConfig = { apiKey: "AIzaSyAYBpV95meCzCoLZWGBhbflqLFiqR0mToc", authDomain: "lastone-2ef2f.firebaseapp.com", projectId: "lastone-2ef2f", storageBucket: "lastone-2ef2f.firebasestorage.app", messagingSenderId: "983919060318", appId: "1:983919060318:web:2708d4b4a0ca3e2d7d5bcf" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentUserId = localStorage.getItem('currentUserId');
    if (!currentUserId) window.location.href = "index.html";

    db.collection("users").doc(currentUserId).onSnapshot((doc) => {
      if(doc.exists) {
        const list = doc.data().beneficiaries || [];
        const container = document.getElementById('beneficiaries-list');
        if(list.length === 0) {
          container.innerHTML = `<div class="py-4 text-center text-slate-400 text-sm">Aucun bénéficiaire.</div>`;
          return;
        }
        container.innerHTML = "";
        list.forEach((b, index) => {
          const div = document.createElement('div');
          div.className = "flex items-center justify-between py-3.5";
          div.innerHTML = `
            <div class="flex items-center space-x-3">
              <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600"><i class="fa-solid fa-user text-sm"></i></div>
              <div>
                <p class="text-sm font-semibold text-slate-800">${b.name}</p>
                <p class="text-xs font-mono text-slate-400">${b.iban}</p>
              </div>
            </div>
            <button onclick="deleteBeneficiary(${index})" class="text-slate-400 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
          `;
          container.appendChild(div);
        });
      }
    });

    function addBeneficiary(e) {
      e.preventDefault();
      const name = document.getElementById('b-name').value.trim();
      const iban = document.getElementById('b-iban').value.trim().toUpperCase();

      db.collection("users").doc(currentUserId).update({
        beneficiaries: firebase.firestore.FieldValue.arrayUnion({ name, iban })
      }).then(() => {
        document.getElementById('b-name').value = "";
        document.getElementById('b-iban').value = "";
        alert("Bénéficiaire ajouté !");
      });
    }

    function deleteBeneficiary(index) {
      if(confirm("Supprimer ce bénéficiaire ?")) {
        db.collection("users").doc(currentUserId).get().then(doc => {
          let list = doc.data().beneficiaries || [];
          list.splice(index, 1);
          return db.collection("users").doc(currentUserId).update({ beneficiaries: list });
        });
      }
    }
    function logout() { localStorage.removeItem('currentUserId'); window.location.href = "index.html"; }
  </script>
</body>
</html>
